project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"

website:
  title: "Analytics Modeling From Scratch"
  description: "Step-by-step analytics modeling walkthroughs for learners who want the formulas, code, and intuition together."
  site-url: "https://brettwhite-git.github.io/intro-analytics-modeling-from-scratch/"
  repo-url: "https://github.com/brettwhite-git/intro-analytics-modeling-from-scratch"
  search:
    location: navbar
    type: overlay
    keyboard-shortcut: ["k"]
    limit: 50
    collapse-after: 3
    copy-button: false
    show-item-context: tree
  navbar:
    title: "Analytics Modeling"
    pinned: true
    left:
      - text: "Goals"
        href: index.qmd#choose-by-goal
      - text: "Topics"
        href: index.qmd#topic-map
      - text: "Practice"
        href: index.qmd#featured-practice
    tools:
      - icon: github
        href: "https://github.com/brettwhite-git/intro-analytics-modeling-from-scratch"
        aria-label: "GitHub"
  sidebar:
    style: docked
    title: "Demo Library"
    collapse-level: 1
    contents:
      - text: "Home"
        icon: house-door
        href: index.qmd
      - section: "Classification"
        contents:
          - text: "SVM"
            href: svm-from-scratch.qmd
          - text: "KNN"
            href: knn-from-scratch.qmd
      - section: "Validation"
        contents:
          - text: "Cross-Validation"
            href: cross-validation-from-scratch.qmd
      - section: "Clustering"
        contents:
          - text: "K-Means"
            href: kmeans-from-scratch.qmd
      - section: "Change Detection"
        contents:
          - text: "CUSUM"
            href: cusum-from-scratch.qmd
      - section: "Time Series"
        contents:
          - text: "Time Series"
            href: time-series-from-scratch.qmd
      - section: "Regression"
        contents:
          - text: "Regression"
            href: regression-from-scratch.qmd
      - section: "Transformations"
        contents:
          - text: "PCA & Box-Cox"
            href: pca-boxcox-from-scratch.qmd
      - section: "Trees"
        contents:
          - text: "CART"
            href: cart-from-scratch.qmd
      - section: "Variable Selection"
        contents:
          - text: "Variable Selection"
            href: variable-selection-from-scratch.qmd
      - section: "Design of Experiments"
        contents:
          - text: "DOE"
            href: doe-from-scratch.qmd
      - section: "Simulation & Markov"
        contents:
          - text: "Simulation & Markov"
            href: simulation-markov-from-scratch.qmd
      - section: "Missing Data"
        contents:
          - text: "Missing Data"
            href: missing-data-from-scratch.qmd
      - section: "Optimization"
        contents:
          - text: "Optimization"
            href: optimization-from-scratch.qmd
      - section: "Advanced Topics"
        contents:
          - text: "Advanced Topics"
            href: advanced-topics-from-scratch.qmd
      - section: "Practice"
        contents:
          - text: "Comprehensive Quiz"
            href: comprehensive-quiz.qmd
          - text: "Binary Choice Drill"
            href: binary-choice-drill.qmd
          - text: "Confusion Matrix Drill"
            href: confusion-matrix-drill.qmd
  page-footer:
    center: "Independent educational resource. Content is CC BY-NC 4.0; code is MIT licensed."

format:
  html:
    toc: true
    toc-depth: 3
    code-fold: false
    theme:
      light: cosmo
      dark: darkly
    css:
      - styles.css
      - responsive-nav.css
    grid:
      body-width: 960px
      sidebar-width: 280px
      margin-width: 300px

language:
  search-text-placeholder: "Search"
